name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Clean build (avoid cache issues)
        run: cargo clean

      - name: Show Xcode SDK
        run: xcode-select -p

      - name: Build iOS
        run: |
          export SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          cargo build --release \
            --target aarch64-apple-ios \
            --no-default-features \
            --features "git" \
            -p eza

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-binary
          path: target/aarch64-apple-ios/release/eza
