name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Clean build (evitar cache bugado)
        run: cargo clean

      - name: Build (iOS)
        run: |
          cargo build --release \
            --target aarch64-apple-ios \
            --no-default-features \
            --features "git"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eza-ios
          path: target/aarch64-apple-ios/release/eza
